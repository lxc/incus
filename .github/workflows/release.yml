name: Release
on:
  push:
    tags:
      - '*'

permissions:
  contents: write
  issues: write
  id-token: write
  attestations: write

jobs:
  goreleaser:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INCUS_VERSION: "6.22"

      - name: Handle attestation
        uses: actions/attest@v4
        with:
          subject-checksums: ./dist/checksums.txt
